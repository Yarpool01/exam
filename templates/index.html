<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Экзамен</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        }
        h1 { font-size: 24px; margin-bottom: 8px; color: #1a1a2e; }
        .subtitle { color: #666; margin-bottom: 24px; }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }
        .info-label { color: #888; }
        .info-value { font-weight: 600; color: #1a1a2e; }
        .level-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }
        .level-3 { background: #e8f5e9; color: #2e7d32; }
        .level-4 { background: #fff3e0; color: #ef6c00; }
        .level-5 { background: #fce4ec; color: #c2185b; }
        .rules {
            margin: 24px 0;
            padding: 16px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        .rules h3 { font-size: 14px; margin-bottom: 8px; color: #444; }
        .rules ul { padding-left: 18px; color: #666; font-size: 14px; }
        .rules li { margin-bottom: 4px; }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            background: #1976d2;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover { background: #1565c0; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Экзамен</h1>
        <p class="subtitle">Проверка знаний</p>

        <div class="info-row">
            <span class="info-label">Студент</span>
            <span class="info-value">{{ student.name }}</span>
        </div>
        <div class="info-row">
            <span class="info-label">Билет</span>
            <span class="level-badge level-{{ student.assigned_level }}">На {{ student.assigned_level }}</span>
        </div>
        <div class="info-row">
            <span class="info-label">Время</span>
            <span class="info-value">{{ time_limit }} минут</span>
        </div>

        <div class="rules">
            <h3>Правила</h3>
            <ul>
                <li>Время ограничено — {{ time_limit }} минут</li>
                <li>Одна попытка</li>
                <li>Ответы проверяются преподавателем</li>
                <li>После отправки изменить ответы нельзя</li>
            </ul>
        </div>

        <form action="/{{ token }}/start" method="post">
            <button type="submit" class="btn">Начать экзамен</button>
        </form>
    </div>
</body>
</html>
